# ==============================================================================
# Playbook Name : site.yml
# Description   : Idempotent baseline system hardening & firewall management.
# Author        : SudoShea
# Version       : 1.0.0
# License       : MIT
# Compatibility : RHEL/Fedora family & Debian/Ubuntu family
# ==============================================================================
---
- name: Baseline Linux System Hardening
  hosts: all
  become: true
  vars:
    insecure_services:
      - telnet
      - vsftpd
      - cups
      - rpcbind
      - avahi-daemon

  tasks:
    # ==========================================================================
    # Phase 1: Disable Insecure Services
    # ==========================================================================
    - name: Ensure insecure/unused services are stopped and disabled
      ansible.builtin.service:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop: "{{ insecure_services }}"
      ignore_errors: true  # Prevents failure if service isn't installed

    # ==========================================================================
    # Phase 2: SSH Configuration Hardening
    # ==========================================================================
    - name: Back up sshd_config before applying changes
      ansible.builtin.copy:
        src: /etc/ssh/sshd_config
        dest: "/etc/ssh/sshd_config.bak_{{ ansible_date_time.iso8601_basic_short }}"
        remote_src: true
        mode: '0600'

    - name: Disable Root Login in SSH
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
        state: present
        validate: '/usr/sbin/sshd -t -f %s'
      notify: Restart SSH

    - name: Disable Password Authentication in SSH
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
        state: present
        validate: '/usr/sbin/sshd -t -f %s'
      notify: Restart SSH

    - name: Disable Empty Passwords in SSH
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitEmptyPasswords'
        line: 'PermitEmptyPasswords no'
        state: present
        validate: '/usr/sbin/sshd -t -f %s'
      notify: Restart SSH

    # ==========================================================================
    # Phase 3: Firewall Configuration
    # ==========================================================================
    # --- Debian / Ubuntu (UFW) ---
    - name: Install UFW on Debian family
      ansible.builtin.apt:
        name: ufw
        state: present
        update_cache: true
      when: ansible_os_family == 'Debian'

    - name: Configure UFW rules on Debian family
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming
      when: ansible_os_family == 'Debian'

    - name: Allow SSH through UFW on Debian family
      community.general.ufw:
        rule: allow
        name: OpenSSH
      when: ansible_os_family == 'Debian'

    # --- RHEL / Fedora (Firewalld) ---
    - name: Install Firewalld on RedHat family
      ansible.builtin.package:
        name: firewalld
        state: present
      when: ansible_os_family == 'RedHat'

    - name: Ensure Firewalld service is running and enabled
      ansible.builtin.service:
        name: firewalld
        state: started
        enabled: true
      when: ansible_os_family == 'RedHat'

    - name: Set default Firewalld zone to drop
      ansible.posix.firewalld:
        zone: drop
        state: present
        permanent: true
        immediate: true
      when: ansible_os_family == 'RedHat'

    - name: Allow SSH in Firewalld drop zone
      ansible.posix.firewalld:
        zone: drop
        service: ssh
        state: enabled
        permanent: true
        immediate: true
      when: ansible_os_family == 'RedHat'

  # ==========================================================================
  # Handlers: Restart services only when configurations change
  # ==========================================================================
  handlers:
    - name: Restart SSH
      ansible.builtin.service:
        name: "{{ 'ssh' if ansible_os_family == 'Debian' else 'sshd' }}"
        state: restarted
